# Server Properties
server.port=8090

# Exclude Spring Boot's default data source auto-configuration
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# MySQL Database Configuration
spring.datasource.mysql.jdbc-url=jdbc:mysql://localhost:3306/database1
spring.datasource.mysql.username=root
spring.datasource.mysql.password=${password_root}
spring.datasource.mysql.driver-class-name=com.mysql.cj.jdbc.Driver

# Oracle Database Configuration
spring.datasource.oracle.jdbc-url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.oracle.username=demouser
spring.datasource.oracle.password=${password_demouser}
spring.datasource.oracle.driver-class-name=oracle.jdbc.OracleDriver
