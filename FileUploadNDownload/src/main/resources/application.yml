files:
  upload-dir: "uploads/"

server:
  port: 8090

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

  datasource:
    url: jdbc:oracle:thin:@localhost:1521:xe
    username: demouser
    password: ${password_demouser}
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
     hibernate:
      ddl-auto: update
      dialect: org.hibernate.dialect.Oracle11gDialect
     show-sql: true